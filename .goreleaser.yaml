version: 2

project_name: irasutoya

before:
  hooks:
    - go mod tidy

builds:
  - id: irasutoya
    main: ./cmd/irasutoya
    binary: irasutoya
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - irasutoya
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE.txt

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  disable: true
